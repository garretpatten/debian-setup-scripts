name: 'Security Guardrails'

on: pull_request

permissions:
  contents: read
  pull-requests: read

jobs:
  scans:
    name: 'Scans'
    # yamllint disable-line rule:line-length
    uses: garretpatten/security-checks/.github/workflows/security-checks.yaml@master
    with:
      opengrep_run: true
      supply_chain_run: true
      trufflehog_run: true
    secrets: inherit
